# fly.toml app configuration file generated for miao on 2026-04-11T19:07:39Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "miao"
primary_region = "sjc"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[env]
  DATA_DIR = "/data"

[[mounts]]
  source = "miao_data"
  destination = "/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024